server {
    listen 80;
    server_name _;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name 3d-api.yourdomain.com; # Templated by script

    ssl_certificate /etc/letsencrypt/live/3d-api.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/3d-api.yourdomain.com/privkey.pem;

    location / {
        proxy_pass http://webui:7860;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
        proxy_pass http://backend-gpu:8000/;
        proxy_read_timeout 600s; # Allow long generation times
    }
}
